<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutch Software</title>
  <style>
    :root {
      --green:      #5BB65A;
      --green-dark: #3D8C3C;
      --text:       #212121;
      --muted:      #757575;
      --bg:         #F5FBF5;
      --card:       #FFFFFF;
      --radius:     14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--green);
      color: #fff;
      padding: 48px 24px 40px;
      text-align: center;
    }
    header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -1px; }
    header p  { margin-top: 10px; opacity: .88; font-size: 1rem; }
    main {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }
    h2 {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .app-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }
    .app-info { flex: 1; }
    .app-info h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .app-info p  { color: var(--muted); font-size: .9rem; line-height: 1.5; margin-bottom: 14px; }
    .app-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .app-links a {
      color: var(--green-dark);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 600;
      border: 1.5px solid var(--green);
      padding: 5px 14px;
      border-radius: 20px;
      transition: background .15s, color .15s;
    }
    .app-links a:hover { background: var(--green); color: #fff; }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      padding: 20px;
    }
    footer a { color: var(--green-dark); }
  </style>
</head>
<body>

<header>
  <h1>Boutch Software</h1>
  <p>Applications Android simples et bienveillantes</p>
</header>

<main>
  <h2>Nos applications</h2>

  <div class="app-card">
    <div class="app-icon">💊</div>
    <div class="app-info">
      <h3>Pilulo</h3>
      <p>Rappel de médicaments et de soins.<br>
         Simple, sans compte, sans serveur.</p>
      <div class="app-links">
        <a href="pilulo/privacy.html">Confidentialité</a>
        <a href="pilulo/terms.html">Conditions d'utilisation</a>
      </div>
    </div>
  </div>

  <!-- Future apps go here -->

</main>

<footer>
  <p>Boutch Software · Boutch Software · France</p>
  <p style="margin-top:6px">
    <a href="mailto:boutchsoftware@gmail.com">boutchsoftware@gmail.com</a>
  </p>
</footer>

</body>
</html>
